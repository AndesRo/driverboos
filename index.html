<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- ===== ICONOS ===== -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- ===== PWA ===== -->
    <meta name="theme-color" content="#ff8c00" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <!-- Splash screen para iOS (requiere apple-splash.png en /public) -->
    <link rel="apple-touch-startup-image" href="/apple-splash.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ===== SEO ===== -->
    <title>DriverBoos - Control de entregas</title>

    <meta
      name="description"
      content="App para conductores de Jumbo/Boosmap. Registra entregas, controla ganancias, gastos, rutas y suscripción."
    />

    <meta
      name="keywords"
      content="DriverBoos, Boosmap, Jumbo, repartidores, entregas, conductores, control de pedidos"
    />

    <meta name="author" content="Andres Romero" />

    <!-- ===== OPEN GRAPH (WhatsApp, Facebook, etc.) ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://driverboos.vercel.app/" />
    <meta property="og:title" content="DriverBoos - Control de entregas" />
    <meta
      property="og:description"
      content="Registra tus entregas, controla rutas, gastos y genera tus reportes financieros al instante."
    />
    <!-- Imagen OBLIGATORIA de 1200×630 para vista previa en redes -->
    <meta
      property="og:image"
      content="https://driverboos.vercel.app/social-preview.png"
    />
    <meta
      property="og:image:secure_url"
      content="https://driverboos.vercel.app/social-preview.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta
      property="og:image:alt"
      content="Logo de DriverBoos con fondo naranja y texto"
    />
    <meta property="og:site_name" content="DriverBoos" />
    <meta property="og:locale" content="es_CL" />

    <!-- ===== TWITTER CARDS ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://driverboos.vercel.app/" />
    <meta name="twitter:title" content="DriverBoos - Control de entregas" />
    <meta
      name="twitter:description"
      content="Controla tus entregas y ganancias desde cualquier dispositivo."
    />
    <!-- Misma imagen que Open Graph -->
    <meta
      name="twitter:image"
      content="https://driverboos.vercel.app/social-preview.png"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
