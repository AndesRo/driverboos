<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- Iconos -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Responsive -->
    <!--
      viewport-fit=cover es la clave que faltaba: sin esto, env(safe-area-inset-bottom)
      en el CSS no se activa y tu navbar fijo puede quedar tapado por el home indicator
      en iPhones con notch (X en adelante).

      Se quita "maximum-scale=1.0, user-scalable=no" porque bloquea el zoom por completo
      (problema de accesibilidad). Si de verdad lo necesitas para que se sienta como app
      nativa, la variante restrictiva queda comentada abajo.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!--
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    -->

    <!-- PWA -->
    <meta name="theme-color" content="#ff8c00" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- SEO -->
    <title>DriverBoos</title>

    <meta
      name="description"
      content="App para conductores. Registra entregas, controla ganancias, gastos, rutas y suscripción."
    />

    <meta
      name="keywords"
      content="DriverBoos, Boosmap, Jumbo, repartidores, entregas, conductores, control de pedidos"
    />

    <meta name="author" content="Andres Romero" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <meta
      property="og:url"
      content="https://driverboos.vercel.app/"
    />

    <meta property="og:title" content="DriverBoos" />

    <meta
      property="og:description"
      content="Registra tus entregas, controla rutas, gastos y genera reportes."
    />

    <meta
      property="og:image"
      content="https://driverboos.vercel.app/icons/icon-512x512.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:url"
      content="https://driverboos.vercel.app/"
    />

    <meta name="twitter:title" content="DriverBoos" />

    <meta
      name="twitter:description"
      content="Controla tus entregas y ganancias desde cualquier dispositivo."
    />

    <meta
      name="twitter:image"
      content="https://driverboos.vercel.app/icons/icon-512x512.png"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
